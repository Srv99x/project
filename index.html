<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduVanta - AI Learning Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #070A10;
      background-image:
        radial-gradient(circle at -12% 50%, rgba(0, 240, 255, 0.06) 0%, transparent 38%),
        radial-gradient(circle at 112% 50%, rgba(176, 38, 255, 0.06) 0%, transparent 38%),
        radial-gradient(circle at 50% -20%, rgba(0, 240, 255, 0.04) 0%, transparent 45%);
      color: #E2E8F0;
      position: relative;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #111216;
    }

    ::-webkit-scrollbar-thumb {
      background: #5b412f;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #73543d;
    }

    /* Animations */
    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(194, 150, 62, 0.1);
      }

      50% {
        box-shadow: 0 0 14px rgba(194, 150, 62, 0.2);
      }
    }

    .animate-pulse-glow {
      animation: pulse-glow 2s infinite;
    }

    .glass-panel {
      background: rgba(17, 21, 32, 0.85);
      box-shadow:
        inset 0 1px 0 rgba(0, 240, 255, 0.06),
        0 0 0 1px rgba(0, 240, 255, 0.08),
        0 16px 36px rgba(0, 0, 0, 0.55),
        0 0 20px rgba(0, 240, 255, 0.04);
      backdrop-filter: blur(24px) saturate(165%);
      -webkit-backdrop-filter: blur(24px) saturate(165%);
      border: 1px solid rgba(0, 240, 255, 0.12);
    }

    /* Primary cyber action button */
    .cyber-button {
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid rgba(0, 240, 255, 0.45);
      color: #00F0FF;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .cyber-button:hover {
      background: rgba(0, 240, 255, 0.18);
      box-shadow: 0 0 18px rgba(0, 240, 255, 0.35);
    }

    /* Secondary / warning button */
    .cyber-button-warning {
      background: rgba(255, 51, 102, 0.08);
      border: 1px solid rgba(255, 51, 102, 0.45);
      color: #FF3366;
    }
    .cyber-button-warning:hover {
      background: rgba(255, 51, 102, 0.18);
      box-shadow: 0 0 18px rgba(255, 51, 102, 0.35);
    }

    /* Subtle blueprint grid overlay on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.025) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* Form controls readability on dark glass surfaces */
    :where(input, select, textarea):not(.editor-textarea) {
      color: #eceef3;
    }

    :where(input, textarea)::placeholder {
      color: #9ca3af;
      opacity: 0.9;
    }

    select {
      color: #eceef3;
    }

    select option {
      background-color: #0f1115;
      color: #eceef3;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,
    select:-webkit-autofill,
    select:-webkit-autofill:hover,
    select:-webkit-autofill:focus {
      -webkit-text-fill-color: #eceef3;
      box-shadow: 0 0 0px 1000px #121419 inset;
      transition: background-color 9999s ease-in-out 0s;
    }

    /* IDE editor styling (react-simple-code-editor + Prism) */
    .editor-root {
      display: flex !important;
      flex-direction: column !important;
      height: 100% !important;
      width: 100% !important;
    }

    .editor-pre,
    .editor-textarea {
      margin: 0 !important;
      padding: 16px !important;
      line-height: 24px !important;
      font-size: 13px !important;
      font-family: 'JetBrains Mono', monospace !important;
      white-space: pre !important;
      word-break: normal !important;
      overflow-wrap: normal !important;
      tab-size: 2 !important;
      -moz-tab-size: 2 !important;
    }

    .editor-textarea {
      color: transparent !important;
      caret-color: #e5e7eb !important;
      outline: none !important;
      background: transparent !important;
      flex: 1 !important;
      resize: none !important;
      border: none !important;
      height: 100% !important;
      width: 100% !important;
      overflow: auto !important;
      overflow-wrap: normal !important;
    }

    .editor-pre {
      pointer-events: none !important;
      color: #e5e7eb !important;
      background: transparent !important;
      flex: 1 !important;
      overflow: auto !important;
      scrollbar-width: none !important;
    }

    .editor-pre::-webkit-scrollbar {
      display: none !important;
    }

    .editor-line {
      display: block !important;
      height: 24px !important;
      line-height: 24px !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .editor-line-active {
      background: rgba(148, 163, 184, 0.12) !important;
    }

    .token.comment,
    .token.prolog,
    .token.doctype,
    .token.cdata {
      color: #6a737d;
    }

    .token.punctuation {
      color: #9aa4b2;
    }

    .token.keyword,
    .token.atrule,
    .token.selector,
    .token.important,
    .token.tag {
      color: #c792ea;
    }

    .token.function,
    .token.class-name,
    .token.property,
    .token.builtin {
      color: #82aaff;
    }

    .token.string,
    .token.attr-value,
    .token.regex {
      color: #c3e88d;
    }

    .token.number,
    .token.boolean,
    .token.constant,
    .token.symbol {
      color: #f78c6c;
    }

    .token.operator,
    .token.entity,
    .token.url,
    .token.variable {
      color: #d6deeb;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* ── Core backgrounds ── */
            background: '#070A10',
            surface: '#111520',

            /* ── Cyberpunk accents ── */
            primary: '#00F0FF',      /* Neon Cyan */
            secondary: '#B026FF',    /* Neon Purple */
            hacker: '#00FF41',       /* Matrix Green */
            warning: '#FF3366',      /* Neon Pink/Red */

            /* ── Text ── */
            maintext: '#E2E8F0',
            subtext: '#8B9BB4',

            /* ── Legacy aliases (keeps existing components working) ── */
            success: '#7FB98A',
            error: '#D46A5F'
          },
          backgroundImage: {
            'cyber-gradient': 'linear-gradient(to right bottom, rgba(0,240,255,0.08), rgba(176,38,255,0.08))'
          }
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
